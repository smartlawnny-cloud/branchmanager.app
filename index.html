<script>
/* ── Notification Center Dropdown ── */
var NotifCenter = (function() {
  var STORAGE_KEY = 'bm-notif-read';
  var _commCache = [];
  var _lastPollTime = null;
  var _browserAsked = false;

  function _requestBrowserPerms() {
    if (!_browserAsked && 'Notification' in window && Notification.permission === 'default') {
      _browserAsked = true;
      Notification.requestPermission();
    }
  }

  function _fireBrowserNotif(title, body) {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    try { new Notification(title, { body: body, icon: '/favicon-32x32.png', tag: 'bm-comms' }); } catch(e) {}
  }

  function _updateCCDot() {
    var dot = document.getElementById('cc-indicator-dot');
    if (!dot) return;
    var readIds = getReadIds();
    var unread = _commCache.filter(function(c) { return readIds.indexOf('comm-' + c.id) < 0; }).length;
    if (unread > 0) { dot.className = 'cc-dot active'; }
    else { dot.className = 'cc-dot'; }
  }

  function _loadComms() {
    var sb = (typeof SupabaseDB !== 'undefined') ? SupabaseDB.client : null;
    if (!sb) return;
    var since = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
    sb.from('communications')
      .select('id,channel,direction,from_number,body,status,created_at,metadata')
      .gte('created_at', since)
      .eq('direction', 'inbound')
      .order('created_at', { ascending: false })
      .limit(50)
      .then(function(r) {
        if (r.error || !r.data) return;
        // Fire browser notifications for genuinely new items
        if (_lastPollTime) {
          var newItems = r.data.filter(function(c) { return c.created_at > _lastPollTime; });
          newItems.forEach(function(c) {
            var meta = c.metadata && typeof c.metadata === 'object' ? c.metadata : {};
            var name = meta.name || c.from_number || 'Unknown';
            var label = c.channel === 'sms' ? 'SMS from ' : (c.channel === 'voicemail' ? 'Voicemail from ' : 'Missed call from ');
            var snippet = c.body ? ' — ' + c.body.substring(0, 60) : '';
            _fireBrowserNotif('Branch Manager', label + name + snippet);
          });
        }
        _commCache = r.data;
        _lastPollTime = new Date().toISOString();
        _updateCCDot();
        updateBadge();
      });
  }

  function markCommsRead() {
    var readIds = getReadIds();
    _commCache.forEach(function(c) {
      var id = 'comm-' + c.id;
      if (readIds.indexOf(id) < 0) readIds.push(id);
    });
    setReadIds(readIds);
    _updateCCDot();
    updateBadge();
  }

  function getReadIds() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; }
  }

  function setReadIds(ids) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(ids)); } catch(e) {}
  }

  function timeAgo(dateStr) {
    if (!dateStr) return '';
    var now = new Date();
    var then = new Date(dateStr);
    var diff = Math.floor((now - then) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
    return Math.floor(diff / 604800) + 'w ago';
  }

  function getClientName(clientId) {
    if (!clientId || typeof DB === 'undefined') return 'Unknown';
    var client = DB.clients.getById(clientId);
    return client ? (client.name || client.firstName + ' ' + (client.lastName || '')) : 'Unknown';
  }

  function buildNotifications() {
    if (typeof DB === 'undefined') return [];
    var items = [];
    var now = new Date();
    var sevenDaysAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000).toISOString();

    // New requests (last 7 days)
    var requests = DB.requests.getAll();
    for (var i = 0; i < requests.length; i++) {
      var r = requests[i];
      if (r.createdAt && r.createdAt >= sevenDaysAgo) {
        items.push({
          id: 'req-' + r.id,
          icon: '📥',
          iconBg: '#e8f5e9',
          msg: 'New request from ' + getClientName(r.clientId || r.client),
          time: r.createdAt,
          page: 'requests',
          recordId: r.id
        });
      }
    }

    // Quotes sent
    var quotes = DB.quotes.getAll();
    for (var i = 0; i < quotes.length; i++) {
      var q = quotes[i];
      if (q.status === 'sent' && q.updatedAt && q.updatedAt >= sevenDaysAgo) {
        items.push({
          id: 'qsent-' + q.id,
          icon: '📤',
          iconBg: '#e3f2fd',
          msg: 'Quote #' + (q.quoteNumber || '?') + ' sent to ' + getClientName(q.clientId || q.client),
          time: q.updatedAt || q.createdAt,
          page: 'quotes',
          recordId: q.id
        });
      }
      // Quotes approved
      if (q.status === 'approved' && q.updatedAt && q.updatedAt >= sevenDaysAgo) {
        items.push({
          id: 'qappr-' + q.id,
          icon: '✅',
          iconBg: '#e8f5e9',
          msg: 'Quote #' + (q.quoteNumber || '?') + ' approved by ' + getClientName(q.clientId || q.client),
          time: q.updatedAt || q.createdAt,
          page: 'quotes',
          recordId: q.id
        });
      }
      // Changes requested by client
      if (q.status === 'awaiting' && q.updatedAt && q.updatedAt >= sevenDaysAgo) {
        items.push({
          id: 'qchg-' + q.id,
          icon: '💬',
          iconBg: '#fff3e0',
          msg: 'Quote #' + (q.quoteNumber || '?') + ' — client requested changes',
          time: q.updatedAt || q.createdAt,
          page: 'quotes',
          recordId: q.id
        });
      }
    }

    // Jobs completed (last 7 days)
    var jobs = DB.jobs.getAll();
    for (var i = 0; i < jobs.length; i++) {
      var j = jobs[i];
      if (j.status === 'completed' && j.updatedAt && j.updatedAt >= sevenDaysAgo) {
        items.push({
          id: 'jdone-' + j.id,
          icon: '🔧',
          iconBg: '#fff3e0',
          msg: 'Job #' + (j.jobNumber || '?') + ' completed',
          time: j.updatedAt || j.createdAt,
          page: 'jobs',
          recordId: j.id
        });
      }
    }

    // Invoices paid (last 7 days) + past due
    var invoices = DB.invoices.getAll();
    for (var i = 0; i < invoices.length; i++) {
      var inv = invoices[i];
      if (inv.status === 'paid' && (inv.paidDate || inv.updatedAt || '') >= sevenDaysAgo) {
        items.push({
          id: 'ipaid-' + inv.id,
          icon: '💰',
          iconBg: '#e8f5e9',
          msg: 'Invoice #' + (inv.invoiceNumber || '?') + ' paid',
          time: inv.paidDate || inv.updatedAt || inv.createdAt,
          page: 'invoices',
          recordId: inv.id
        });
      }
      if (inv.status !== 'paid' && inv.status !== 'draft' && inv.dueDate) {
        var due = new Date(inv.dueDate);
        if (due < now) {
          items.push({
            id: 'idue-' + inv.id,
            icon: '⚠️',
            iconBg: '#fce4ec',
            msg: 'Invoice #' + (inv.invoiceNumber || '?') + ' past due',
            time: inv.dueDate,
            page: 'invoices',
            recordId: inv.id
          });
        }
      }
    }

    // Inbound communications (SMS / calls / voicemails from Dialpad)
    for (var i = 0; i < _commCache.length; i++) {
      var c = _commCache[i];
      var meta = c.metadata && typeof c.metadata === 'object' ? c.metadata : {};
      var cName = meta.name || c.from_number || 'Unknown';
      var cIcon = c.channel === 'sms' ? '💬' : (c.channel === 'voicemail' ? '📭' : '📵');
      var cBg   = c.channel === 'sms' ? '#e3f2fd' : '#fce4ec';
      var cMsg  = (c.channel === 'sms' ? 'SMS from ' : (c.channel === 'voicemail' ? 'Voicemail from ' : 'Missed call from ')) + cName;
      if (meta.service_wanted) cMsg += ' — ' + meta.service_wanted.substring(0, 35);
      items.push({ id: 'comm-' + c.id, icon: cIcon, iconBg: cBg, msg: cMsg, time: c.created_at, page: 'callcenter', recordId: c.id });
    }

    // Sort by time descending
    items.sort(function(a, b) {
      return (b.time || '').localeCompare(a.time || '');
    });

    return items.slice(0, 30);
  }

  function render() {
    var dropdown = document.getElementById('notif-dropdown');
    if (!dropdown) return;

    var items = buildNotifications();
    var readIds = getReadIds();

    var html = '<div class="notif-dropdown-header">'
      + '<h3>Notifications</h3>'
      + '<a onclick="NotifCenter.markAllRead()">Mark all read</a>'
      + '</div>';

    html += '<div class="notif-dropdown-list">';
    if (items.length === 0) {
      html += '<div class="notif-dropdown-empty">No recent notifications</div>';
    } else {
      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var isRead = readIds.indexOf(item.id) >= 0;
        // Safely encode IDs so quotes/backslashes in data don't break the onclick
        var safePage = String(item.page || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        var safeRecordId = String(item.recordId || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        var safeId = String(item.id || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        html += '<div class="notif-dropdown-item' + (isRead ? '' : ' unread') + '" onclick="NotifCenter.clickItem(\'' + safePage + '\',\'' + safeRecordId + '\',\'' + safeId + '\')">'
          + '<div class="notif-dropdown-icon" style="background:' + item.iconBg + ';">' + item.icon + '</div>'
          + '<div class="notif-dropdown-body">'
          + '<p class="notif-dropdown-msg">' + item.msg + '</p>'
          + '<p class="notif-dropdown-time">' + timeAgo(item.time) + '</p>'
          + '</div>'
          + (isRead ? '' : '<div class="notif-dropdown-dot"></div>')
          + '</div>';
      }
    }
    html += '</div>';

    html += '<div class="notif-dropdown-footer">'
      + '<a onclick="NotifCenter.close();loadPage(\'notifications\');">View all activity &rarr;</a>'
      + '</div>';

    dropdown.innerHTML = html;
  }

  function updateBadge() {
    var badge = document.getElementById('notif-badge');
    if (!badge) return;
    var items = buildNotifications();
    var readIds = getReadIds();
    var unread = 0;
    for (var i = 0; i < items.length; i++) {
      if (readIds.indexOf(items[i].id) < 0) unread++;
    }
    if (unread > 0) {
      badge.textContent = unread > 99 ? '99+' : unread;
      badge.className = 'notif-badge active';
    } else {
      badge.textContent = '';
      badge.className = 'notif-badge';
    }
  }

  function toggle(e) {
    if (e) { e.stopPropagation(); e.preventDefault(); }
    var dropdown = document.getElementById('notif-dropdown');
    if (!dropdown) return;
    var isOpen = dropdown.classList.contains('open');
    if (isOpen) {
      close();
    } else {
      render();
      dropdown.classList.add('open');
    }
  }

  function close() {
    var dropdown = document.getElementById('notif-dropdown');
    if (dropdown) dropdown.classList.remove('open');
  }

  function clickItem(page, recordId, notifId) {
    // Mark as read
    var readIds = getReadIds();
    if (readIds.indexOf(notifId) < 0) {
      readIds.push(notifId);
      setReadIds(readIds);
    }
    close();
    updateBadge();
    // Navigate to page
    if (typeof loadPage === 'function') {
      loadPage(page);
    }
  }

  function markAllRead() {
    var items = buildNotifications();
    var readIds = getReadIds();
    for (var i = 0; i < items.length; i++) {
      if (readIds.indexOf(items[i].id) < 0) {
        readIds.push(items[i].id);
      }
    }
    setReadIds(readIds);
    render();
    updateBadge();
    if (typeof UI !== 'undefined' && UI.toast) UI.toast('All notifications marked as read');
  }

  // Close on outside click
  document.addEventListener('click', function(e) {
    var dropdown = document.getElementById('notif-dropdown');
    var bell = document.getElementById('notif-bell-btn');
    if (!dropdown || !dropdown.classList.contains('open')) return;
    if (!dropdown.contains(e.target) && (!bell || !bell.contains(e.target))) {
      close();
    }
  });

  // Update badge periodically + poll communications
  function init() {
    updateBadge();
    setInterval(updateBadge, 60000);
    // Start communications polling (delayed to let SupabaseDB initialize)
    setTimeout(function() {
      _requestBrowserPerms();
      _loadComms();
      setInterval(_loadComms, 30000);
    }, 4000);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    setTimeout(init, 500);
  }

  return {
    toggle: toggle,
    close: close,
    clickItem: clickItem,
    markAllRead: markAllRead,
    updateBadge: updateBadge,
    markCommsRead: markCommsRead,
    refreshComms: _loadComms
  };
})();
</script>
<script>
// Daily automations — runs once per day in background
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(function() {
    if (typeof AutomationsPage !== 'undefined' && AutomationsPage.init) {
      AutomationsPage.init();
      if (AutomationsPage.startApprovalPolling) AutomationsPage.startApprovalPolling();
    }
    if (typeof SupabaseDB !== 'undefined' && SupabaseDB.startRequestPolling) {
      SupabaseDB.startRequestPolling();
    }
    // Auto-mark overdue invoices and fix invalid job statuses on every app load
    if (typeof DB !== 'undefined') {
      if (DB.invoices && DB.invoices.markOverdue) DB.invoices.markOverdue();
      if (DB.jobs && DB.jobs.fixStatuses) DB.jobs.fixStatuses();
    }
    // Start session timeout timer (auto-logout after 30 days inactivity)
    if (typeof Auth !== 'undefined' && Auth.startSessionTimer) Auth.startSessionTimer();
    // Biometric gate — if user has enabled Face ID / Touch ID, show lock screen now
    if (typeof Biometric !== 'undefined' && Biometric.initGate) Biometric.initGate();
    // Check for auto review requests
    if (typeof ReviewsPage !== 'undefined' && ReviewsPage.checkAutoReviews) ReviewsPage.checkAutoReviews();
    // Initialize TeamChat real-time subscription
    if (typeof TeamChat !== 'undefined' && TeamChat._init) TeamChat._init();
    // Global inbound SMS notifier — fires a toast + badge regardless of current page
    (function() {
      var sb = (typeof SupabaseDB !== 'undefined' && SupabaseDB.client) ? SupabaseDB.client : null;
      if (!sb) return;
      sb.channel('global-sms-inbound')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'communications', filter: 'channel=eq.sms' }, function(payload) {
          var row = payload.new || {};
          if (row.direction !== 'inbound') return;
          // Don't toast if user is already on the call center page
          if (window._currentPage === 'callcenter') return;
          var phone = (row.from_number || '').replace(/\D/g, '').slice(-10);
          var clients = (typeof DB !== 'undefined') ? DB.clients.getAll() : [];
          var match = clients.find(function(c) { return (c.phone||'').replace(/\D/g,'').slice(-10) === phone; });
          var name = match ? (match.name || match.firstName) : (phone ? '(' + phone.slice(0,3) + ') ' + phone.slice(3,6) + '-' + phone.slice(6) : 'Unknown');
          var preview = (row.body || '').slice(0, 60);
          if (typeof UI !== 'undefined' && UI.toast) {
            UI.toast('💬 New text from ' + name + (preview ? ' — tap Call Center to reply' : ''));
          }
          // Refresh call center dashboard widget if visible
          if (typeof DashboardPage !== 'undefined' && DashboardPage._fillCallCenterWidget && window._currentPage === 'dashboard') {
            DashboardPage._fillCallCenterWidget();
          }
          // Refresh call center notification badge
          if (typeof NotifCenter !== 'undefined' && NotifCenter.refreshComms) NotifCenter.refreshComms();
        })
        .subscribe();
    })();
  }, 3000);
});
// Initialize Lucide icons after DOM is ready
if (typeof lucide !== 'undefined') lucide.createIcons();
// Re-init after page loads (for dynamically added icons)
document.addEventListener('DOMContentLoaded', function() { if (typeof lucide !== 'undefined') lucide.createIcons(); });
// Restore sidebar state
if (localStorage.getItem('bm-sidebar-collapsed') === 'true') {
  document.getElementById('sidebar').classList.add('collapsed');
  var tb = document.getElementById('sidebar-toggle-btn');
  if (tb) tb.textContent = '▶';
}
// Browser back/forward button support
window.addEventListener('popstate', function(e) {
  var page = (e.state && e.state.page) || (window.location.hash ? window.location.hash.slice(1) : 'dashboard');
  if (page && typeof loadPage === 'function') loadPage(page);
});
// Load page from URL hash on initial load
if (window.location.hash && window.location.hash.length > 1) {
  var hashPage = window.location.hash.slice(1);
  if (typeof loadPage === 'function' && typeof pageRenderers !== 'undefined' && pageRenderers[hashPage]) {
    setTimeout(function() { loadPage(hashPage); }, 100);
  }
}
</script>
