name = "branchmanager-proxy"
main = "index.js"
compatibility_date = "2024-09-23"

# Don't expose the Worker at branchmanager-proxy.<subdomain>.workers.dev —
# only the configured zone routes (branchmanager.app, clients.branchmanager.app)
# should be able to reach it. Closes a small surface area of public URLs that
# could bypass our zone-level rules / WAF.
workers_dev = false
preview_urls = false

# Account / zone associations are managed in the Cloudflare dashboard.
# Workers & Pages → branchmanager-proxy → Settings → Triggers → Routes
#   • branchmanager.app/*
#   • clients.branchmanager.app/*

# Deploy:
#   cd ~/Desktop/Tree/branchmanager-app/cloudflare-worker
#   npx wrangler login         # one-time, opens browser to authorize
#   npx wrangler deploy        # ships index.js to production

# Test before deploy:
#   npx wrangler dev           # runs the Worker locally on http://localhost:8787
#                              # then curl localhost:8787/sw.js to verify headers
